version: '3.8'

# =============================================================================
# RAG Pipeline Docker Compose - DEVELOPMENT
# =============================================================================
# Standalone dev compose with hot-reload for all services.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# =============================================================================

services:
  # ===========================================================================
  # GATEWAY SERVICE - Main Entry Point
  # ===========================================================================
  gateway:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      - QUERY_OPTIMIZER_URL=http://query-optimizer:5000
      - EMBED_SERVICE_URL=http://embed-service:4000
      - SEARCH_SERVICE_URL=http://search-service:3000
      - ASK_SERVICE_URL=http://ask-service:2000
      - LOG_LEVEL=debug
    volumes:
      - ./gateway-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    depends_on:
      query-optimizer:
        condition: service_started
      embed-service:
        condition: service_started
      search-service:
        condition: service_started
      ask-service:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped

  # ===========================================================================
  # QUERY OPTIMIZER SERVICE
  # ===========================================================================
  query-optimizer:
    build:
      context: ./query-optimizer-service
      dockerfile: Dockerfile
    container_name: query-optimizer-service
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=debug
    volumes:
      - ./query-optimizer-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload --reload-dir /app
    networks:
      - rag-network
    restart: unless-stopped

  # ===========================================================================
  # EMBED SERVICE
  # ===========================================================================
  embed-service:
    build:
      context: ./embed-service
      dockerfile: Dockerfile
    expose:
      - "4000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=debug
    volumes:
      - ./embed-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 4000 --reload --reload-dir /app
    networks:
      - rag-network
    restart: unless-stopped

  # ===========================================================================
  # SEARCH SERVICE
  # ===========================================================================
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - MILVUS_IP_ADDRESS=milvus-standalone
      - LOG_LEVEL=debug
    volumes:
      - ./search-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 3000 --reload --reload-dir /app
    networks:
      - rag-network
      - storage-network
    restart: unless-stopped

  # ===========================================================================
  # ASK SERVICE
  # ===========================================================================
  ask-service:
    build:
      context: ./ask-service
      dockerfile: Dockerfile
    container_name: ask-service
    expose:
      - "2000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=debug
    volumes:
      - ./ask-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 2000 --reload --reload-dir /app
    networks:
      - rag-network
    restart: unless-stopped

  # ===========================================================================
  # SERVER - Client-facing Master API
  # ===========================================================================
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: master-server
    ports:
      - "8200:3000"
    env_file:
      - .env.storage
    environment:
      - DB_HOST=books-db
      - DB_PORT=5432
      - DB_DATABASE=islamic-library-db
      - NODE_ENV=development
    volumes:
      - ../server:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - rag-network
      - storage-network
    restart: unless-stopped

  # ===========================================================================
  # INTERNAL SERVICE - Testing UI
  # ===========================================================================
  internal-service:
    build:
      context: ./internal-service
      dockerfile: Dockerfile
    container_name: internal-service
    ports:
      - "3001:5173"
    environment:
      - DOCKER_ENV=true
      - NODE_ENV=development
    volumes:
      - ./internal-service:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      gateway:
        condition: service_started
      query-optimizer:
        condition: service_started
      embed-service:
        condition: service_started
      search-service:
        condition: service_started
      ask-service:
        condition: service_started
    networks:
      - rag-network
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  rag-network:
    driver: bridge
    name: rag-network
  storage-network:
    external: true
    name: storage-network
